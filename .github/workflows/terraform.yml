# ──────────────────────────────────────────────────────────────────────────────
# Terraform CI/CD Pipeline — EKS Cluster
# Triggered manually via workflow_dispatch.
# Supports: validate, plan, apply  (choose action + environment at dispatch)
#
# TFVARS STRATEGY:
#   .tfvars are git-ignored. Instead, the full tfvars content is stored as a
#   single GitHub **Environment secret** called  TFVARS_FILE  (one per env).
#   The workflow writes it to a temp file at runtime — nothing sensitive is
#   committed to the repo.
#
#   HOW TO SET UP:
#   1. Go to  Settings → Environments  and create: dev, staging, prod
#   2. In each environment, add a secret named  TFVARS_FILE  whose value is
#      the full contents of the corresponding .tfvars file. Example:
#
#        region            = "ap-south-1"
#        name              = "dev"
#        vpc_cidr          = "10.10.0.0/16"
#        az_count          = 2
#        cluster_version   = "1.29"
#        allowed_ssh_cidrs = ["10.0.0.0/8"]
#        node_min_size     = 1
#        ...
#
#   3. Also add  AWS_ROLE_ARN  secret (OIDC role) in each environment.
# ──────────────────────────────────────────────────────────────────────────────

name: "Terraform EKS Pipeline"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - validate
          - plan
          - apply
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

# Only one run per environment at a time (prevents state corruption)
concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC → AWS
  contents: read

env:
  TF_VERSION: "1.9.0"
  AWS_REGION: "ap-south-1"
  # ── S3 Backend (one bucket, per-env state key) ──
  TF_BACKEND_BUCKET: "your-terraform-state-bucket"          # TODO: replace
  TF_BACKEND_KEY: "eks/${{ github.event.inputs.environment }}/terraform.tfstate"
  TF_BACKEND_REGION: "ap-south-1"

jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.action }} – ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      # ─── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Configure AWS credentials (OIDC recommended) ────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}       # OIDC role ARN
          # aws-region: ${{ env.AWS_REGION }}
          # ── OR use static keys (less secure, comment out role-to-assume): ──
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ─── 3. Write tfvars from GitHub Environment secret ──────────────────
      - name: Write tfvars file from secret
        run: |
          echo '${{ secrets.TFVARS_FILE }}' > terraform.tfvars
          echo "✅ tfvars written from environment secret"

      # ─── 4. Setup Terraform ─────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ─── 5. Terraform Init (with S3 backend) ────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" \
            -backend-config="key=${{ env.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ env.TF_BACKEND_REGION }}" \
            -input=false

      # ─── 6. Terraform Format Check ──────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # ─── 7. Terraform Validate ──────────────────────────────────────────
      - name: Terraform Validate
        if: github.event.inputs.action == 'validate' || github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: terraform validate

      # ─── 8. Terraform Plan ──────────────────────────────────────────────
      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -input=false

      # ─── 9. Upload Plan Artifact (for audit / review) ───────────────────
      - name: Upload Plan Artifact
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: tfplan
          retention-days: 30

      # ─── 10. Terraform Apply (only when explicitly chosen) ──────────────
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      # ─── 11. Cleanup sensitive file ─────────────────────────────────────
      - name: Cleanup tfvars
        if: always()
        run: rm -f terraform.tfvars
